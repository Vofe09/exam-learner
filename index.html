<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тренажёр тестов</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --good: #34d399;
      --bad: #f87171;
      --border: rgba(255,255,255,0.10);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      background: rgba(17, 24, 39, 0.82);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 14px;
    }

    .titleRow {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.4fr 0.7fr auto;
      gap: 12px;
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }

    select, button, input[type="number"] {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }

    button {
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      font-weight: 600;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: translateY(1px); }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .content {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      padding: 8px 12px;
      border-radius: 999px;
    }

    .card {
      background: rgba(31, 41, 55, 0.75);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .question {
      font-size: clamp(18px, 2.2vw, 24px);
      line-height: 1.35;
      margin: 0 0 16px;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    .answerBtn {
      text-align: left;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.35;
    }

    .answerBtn:hover {
      background: rgba(255,255,255,0.07);
    }

    .answerBtn.correct {
      background: rgba(52, 211, 153, 0.15);
      border-color: rgba(52, 211, 153, 0.6);
    }

    .answerBtn.wrong {
      background: rgba(248, 113, 113, 0.15);
      border-color: rgba(248, 113, 113, 0.6);
    }

    .footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .status {
      min-height: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }

    .hidden { display: none !important; }

    .emptyState {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div class="titleRow">
        <div>
          <h1>Тренажёр тестов</h1>
          <p class="subtitle">Выбери тест, загрузи его из JSON и проходи вопросы в случайном порядке.</p>
        </div>
      </div>

      <div class="controls">
        <select id="testSelect">
          <option value="">Загрузка списка тестов...</option>
        </select>
        <button id="loadBtn">Загрузить тест</button>
        <button id="nextBtn" disabled>Следующий вопрос</button>
      </div>
    </section>

    <section class="content">
      <div class="stats">
        <span class="badge" id="questionsCount">Вопросов: 0</span>
        <span class="badge" id="scoreCount">Счёт: 0</span>
        <span class="badge" id="seenCount">Показано: 0</span>
      </div>

      <div id="emptyState" class="emptyState">
        Выбери тест и нажми «Загрузить тест».<br />
        Формат JSON описан ниже в коде.
      </div>

      <div id="quizCard" class="card hidden">
        <p id="questionText" class="question"></p>
        <div id="answersList" class="answers"></div>
        <div class="footer">
          <div id="statusText" class="status"></div>
          <div id="progressText"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const testSelect = document.getElementById('testSelect');
    const loadBtn = document.getElementById('loadBtn');
    const nextBtn = document.getElementById('nextBtn');
    const emptyState = document.getElementById('emptyState');
    const quizCard = document.getElementById('quizCard');
    const questionText = document.getElementById('questionText');
    const answersList = document.getElementById('answersList');
    const statusText = document.getElementById('statusText');
    const progressText = document.getElementById('progressText');
    const questionsCount = document.getElementById('questionsCount');
    const scoreCount = document.getElementById('scoreCount');
    const seenCount = document.getElementById('seenCount');

    let activeTest = null;
    let remainingQuestions = [];
    let currentQuestion = null;
    let score = 0;
    let seen = 0;
    let answered = false;

    async function loadTestIndex() {
      try {
        const response = await fetch('./tests/index.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Не удалось загрузить index.json');

        const testIndex = await response.json();
        renderTestOptions(testIndex);
      } catch (error) {
        testSelect.innerHTML = '<option value="">Не удалось загрузить список тестов</option>';
        console.error(error);
        statusText.textContent = 'Ошибка загрузки списка тестов.';
        statusText.className = 'status bad';
      }
    }

    function renderTestOptions(testIndex) {
      const tests = Array.isArray(testIndex) ? testIndex : testIndex.tests;
      if (!Array.isArray(tests) || tests.length === 0) {
        testSelect.innerHTML = '<option value="">Список тестов пуст</option>';
        return;
      }

      testSelect.innerHTML = ['<option value="">Выберите тест</option>']
        .concat(tests.map((test) => {
          const file = typeof test === 'string' ? test : test.file;
          const title = typeof test === 'string' ? test : (test.title || test.file);
          return `<option value="${escapeHtml(file)}">${escapeHtml(title)}</option>`;
        }))
        .join('');
    }

    async function loadSelectedTest() {
      const fileName = testSelect.value;
      if (!fileName) return;

      try {
        const response = await fetch(`./tests/${fileName}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Не удалось загрузить ${fileName}`);

        const testData = await response.json();
        validateTestData(testData);

        activeTest = testData;
        remainingQuestions = shuffleArray([...testData.questions]);
        score = 0;
        seen = 0;

        updateStats();
        emptyState.classList.add('hidden');
        quizCard.classList.remove('hidden');
        nextBtn.disabled = false;
        showNextQuestion(true);
      } catch (error) {
        console.error(error);
        statusText.textContent = 'Ошибка загрузки теста.';
        statusText.className = 'status bad';
      }
    }

    function validateTestData(testData) {
      if (!testData || !Array.isArray(testData.questions)) {
        throw new Error('Неверный формат теста');
      }

      testData.questions.forEach((question, index) => {
        if (!question.text || !Array.isArray(question.options) || question.options.length !== 4) {
          throw new Error(`Вопрос ${index + 1} должен содержать текст и 4 варианта ответа`);
        }
        if (
          typeof question.correctIndex !== 'number' ||
          question.correctIndex < 0 ||
          question.correctIndex > 3
        ) {
          throw new Error(`Вопрос ${index + 1} содержит неверный correctIndex`);
        }
      });
    }

    function showNextQuestion(firstLoad = false) {
      if (!activeTest) return;

      if (remainingQuestions.length === 0) {
        remainingQuestions = shuffleArray([...activeTest.questions]);
      }

      currentQuestion = remainingQuestions.shift();
      answered = false;
      seen += 1;

      questionText.textContent = currentQuestion.text;
      answersList.innerHTML = '';
      statusText.textContent = firstLoad ? 'Тест загружен. Выбери ответ.' : '';
      statusText.className = 'status';

      currentQuestion.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = 'answerBtn';
        button.type = 'button';
        button.textContent = option;
        button.addEventListener('click', () => handleAnswer(index, button));
        answersList.appendChild(button);
      });

      progressText.textContent = `Осталось: ${remainingQuestions.length}`;
      updateStats();
    }

    function handleAnswer(selectedIndex, button) {
      if (answered || !currentQuestion) return;
      answered = true;

      const buttons = [...answersList.querySelectorAll('.answerBtn')];
      const correctIndex = currentQuestion.correctIndex;
      const correctButton = buttons[correctIndex];

      buttons.forEach((btn, index) => {
        btn.disabled = true;
        if (index === correctIndex) btn.classList.add('correct');
      });

      if (selectedIndex === correctIndex) {
        score += 1;
        button.classList.add('correct');
        statusText.textContent = 'Верно.';
        statusText.className = 'status good';
      } else {
        button.classList.add('wrong');
        if (correctButton) correctButton.classList.add('correct');
        statusText.textContent = `Неверно. Правильный ответ: ${currentQuestion.options[correctIndex]}`;
        statusText.className = 'status bad';
      }

      updateStats();
      nextBtn.disabled = false;
      progressText.textContent = `Осталось: ${remainingQuestions.length}`;
    }

    function updateStats() {
      questionsCount.textContent = `Вопросов: ${activeTest ? activeTest.questions.length : 0}`;
      scoreCount.textContent = `Счёт: ${score}`;
      seenCount.textContent = `Показано: ${seen}`;
    }

    function shuffleArray(items) {
      const array = [...items];
      for (let i = array.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    loadBtn.addEventListener('click', loadSelectedTest);
    nextBtn.addEventListener('click', () => showNextQuestion(false));
    testSelect.addEventListener('change', () => {
      nextBtn.disabled = true;
    });

    loadTestIndex();
  </script>

  <!--
  Структура файлов на сервере:

  /tests/index.json
  /tests/math.json
  /tests/history.json

  Пример index.json:
  {
    "tests": [
      { "title": "Математика", "file": "math.json" },
      { "title": "История", "file": "history.json" }
    ]
  }

  Пример math.json:
  {
    "title": "Математика",
    "questions": [
      {
        "text": "Сколько будет 2 + 2?",
        "options": ["3", "4", "5", "22"],
        "correctIndex": 1
      },
      {
        "text": "Сколько будет 10 - 6?",
        "options": ["2", "3", "4", "5"],
        "correctIndex": 2
      }
    ]
  }
  -->
</body>
</html>
